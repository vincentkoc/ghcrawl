name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          lookup-only: true

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Run workspace typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Run workspace tests
        run: pnpm test

  cluster-perf:
    name: Cluster Perf
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Run cluster performance integration test
        env:
          GHCRAWL_CLUSTER_PERF_OUTPUT_PATH: ${{ runner.temp }}/cluster-perf.json
        run: pnpm test:cluster-perf

      - name: Upload cluster performance report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cluster-perf-report
          path: ${{ runner.temp }}/cluster-perf.json
          if-no-files-found: ignore

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Verify non-interactive doctor JSON
        run: pnpm health

      - name: Print installed-bin usage from bin shim
        run: node ./apps/cli/bin/ghcrawl.js --help

      - name: Verify root passthrough usage
        run: pnpm cli --help

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Pack and install publishable workspace packages
        run: pnpm pack:smoke
