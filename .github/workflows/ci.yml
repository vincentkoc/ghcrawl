name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Run workspace typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Run workspace tests
        run: pnpm test

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Initialize local runtime
        run: pnpm bootstrap

      - name: Print installed-bin usage from bin shim
        run: node ./apps/cli/bin/gitcrawl.js --help

      - name: Verify root passthrough usage
        run: pnpm cli --help

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Pack and install publishable workspace packages
        run: pnpm pack:smoke
